<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>3D Demon Hunt</title>
<style>
body{margin:0;background:black;overflow:hidden;font-family:sans-serif;color:white}
#ui{position:absolute;top:10px;left:10px}
</style>
</head>

<body>

<div id="ui">
<h3>和風3D鬼討伐</h3>
WASD 移動<br>
マウス 視点<br>
クリック 攻撃<br>
SHIFT ダッシュ<br>
<p id="msg"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/PointerLockControls.js"></script>

<script>

let scene,camera,renderer,controls
let demons=[]
let bullets=[]
let obstacles=[]
let gameOver=false

init()
animate()

function init(){

scene=new THREE.Scene()

scene.background=new THREE.Color(0x0a0a1a)

camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000)

renderer=new THREE.WebGLRenderer()
renderer.setSize(innerWidth,innerHeight)
document.body.appendChild(renderer.domElement)

controls=new THREE.PointerLockControls(camera,document.body)

document.body.addEventListener("click",()=>controls.lock())

scene.add(controls.getObject())

let moonLight=new THREE.DirectionalLight(0x88aaff,1)
moonLight.position.set(20,50,10)
scene.add(moonLight)

let ambient=new THREE.AmbientLight(0x404040)
scene.add(ambient)

createGround()
createForest()
createObstacles()
spawnDemons()

}

function createGround(){

let g=new THREE.PlaneGeometry(200,200)
let m=new THREE.MeshStandardMaterial({color:0x223322})
let floor=new THREE.Mesh(g,m)
floor.rotation.x=-Math.PI/2
scene.add(floor)

}

function createForest(){

for(let i=0;i<80;i++){

let tree=new THREE.Mesh(
new THREE.CylinderGeometry(0.3,0.5,6),
new THREE.MeshStandardMaterial({color:0x553322})
)

tree.position.set(Math.random()*180-90,3,Math.random()*180-90)

scene.add(tree)

}

}

function createObstacles(){

for(let i=0;i<30;i++){

let rock=new THREE.Mesh(
new THREE.BoxGeometry(2,2,2),
new THREE.MeshStandardMaterial({color:0x555555})
)

rock.position.set(Math.random()*100-50,1,Math.random()*100-50)

scene.add(rock)
obstacles.push(rock)

}

}

function spawnDemons(){

for(let i=0;i<6;i++){

let body=new THREE.Mesh(
new THREE.CylinderGeometry(0.7,0.9,2.5),
new THREE.MeshStandardMaterial({color:0xaa0000})
)

body.position.set(Math.random()*60-30,1.2,Math.random()*60-30)

scene.add(body)

demons.push({
mesh:body,
cooldown:0
})

}

}

let keys={}

document.addEventListener("keydown",e=>keys[e.code]=true)
document.addEventListener("keyup",e=>keys[e.code]=false)

document.addEventListener("mousedown",attack)

function attack(){

let p=controls.getObject().position

for(let d of demons){

let dist=p.distanceTo(d.mesh.position)

if(dist<3){

scene.remove(d.mesh)
demons=demons.filter(x=>x!==d)

}

}

}

function shoot(demon){

let geo=new THREE.SphereGeometry(0.2)

let mat=new THREE.MeshBasicMaterial({color:0xff0000})

let b=new THREE.Mesh(geo,mat)

b.position.copy(demon.mesh.position)

scene.add(b)

let dir=controls.getObject().position.clone().sub(b.position).normalize()

bullets.push({mesh:b,dir:dir})

}

function updateBullets(){

for(let b of bullets){

b.mesh.position.add(b.dir.clone().multiplyScalar(0.4))

let p=controls.getObject().position

if(p.distanceTo(b.mesh.position)<1){

gameOver=true
document.getElementById("msg").innerText="GAME OVER"

}

}

}

function demonLogic(){

let player=controls.getObject().position

for(let d of demons){

let pos=d.mesh.position

let dir=player.clone().sub(pos).normalize()

pos.add(dir.multiplyScalar(0.01))

let vector=pos.clone().project(camera)

let inView=
vector.x>-1&&vector.x<1&&
vector.y>-1&&vector.y<1&&
vector.z>0

if(inView){

d.cooldown--

if(d.cooldown<=0){

shoot(d)

d.cooldown=120

}

}

}

}

function movement(){

let speed=0.1

if(keys["ShiftLeft"])speed=0.2

if(keys["KeyW"])controls.moveForward(speed)
if(keys["KeyS"])controls.moveForward(-speed)
if(keys["KeyA"])controls.moveRight(-speed)
if(keys["KeyD"])controls.moveRight(speed)

}

function animate(){

requestAnimationFrame(animate)

if(!gameOver){

movement()
demonLogic()
updateBullets()

}

renderer.render(scene,camera)

}

</script>

</body>
</html>
