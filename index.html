<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Samurai Demon Game</title>
<style>
body{margin:0;background:#0f1a18}
canvas{display:block;margin:auto;background:#1f2f28}
</style>
</head>

<body>

<canvas id="game" width="900" height="500"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let keys={}
document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

let player={
x:100,
y:350,
w:40,
h:60,
vx:0,
vy:0,
onGround:false
}

let gravity=0.7

let enemies=[]
let bullets=[]
let obstacles=[]

for(let i=0;i<6;i++){

enemies.push({
x:500+i*250,
y:360,
cooldown:0
})

}

for(let i=0;i<12;i++){

obstacles.push({
x:250+i*120,
y:380,
w:40,
h:40
})

}

function attack(){

for(let e of enemies){

if(Math.abs(player.x-e.x)<60){

e.dead=true

}

}

}

document.addEventListener("keydown",e=>{
if(e.key==="z")attack()
})

function shoot(enemy){

bullets.push({
x:enemy.x,
y:enemy.y+20,
vx:-5
})

}

function update(){

player.vx=0

if(keys["ArrowRight"]) player.vx=4
if(keys["ArrowLeft"]) player.vx=-4

if(keys["ArrowUp"] && player.onGround){

player.vy=-12
player.onGround=false

}

player.vy+=gravity

player.x+=player.vx
player.y+=player.vy

if(player.y>350){

player.y=350
player.vy=0
player.onGround=true

}

for(let o of obstacles){

if(
player.x<o.x+o.w &&
player.x+player.w>o.x &&
player.y+player.h>o.y &&
player.y+player.h<o.y+20
){

player.y=o.y-player.h
player.vy=0
player.onGround=true

}

}

for(let e of enemies){

if(e.dead)continue

if(e.x-player.x<800 && e.x-player.x>-50){

e.cooldown--

if(e.cooldown<=0){

shoot(e)
e.cooldown=120

}

}

}

for(let b of bullets){

b.x+=b.vx

if(
b.x>player.x &&
b.x<player.x+player.w &&
b.y>player.y &&
b.y<player.y+player.h
){

alert("GAME OVER")
location.reload()

}

}

}

let camX=0

function drawPlayer(x,y){

// 体
ctx.fillStyle="#2ecc71"
ctx.fillRect(x+10,y+20,20,40)

// 頭
ctx.fillStyle="#ffd1a4"
ctx.beginPath()
ctx.arc(x+20,y+10,10,0,Math.PI*2)
ctx.fill()

// 目
ctx.fillStyle="black"
ctx.fillRect(x+16,y+8,3,3)
ctx.fillRect(x+21,y+8,3,3)

// 刀
ctx.fillStyle="silver"
ctx.fillRect(x+30,y+30,20,3)

}

function drawEnemy(x,y){

//体
ctx.fillStyle="#aa0000"
ctx.fillRect(x,y,40,40)

//目
ctx.fillStyle="white"
ctx.fillRect(x+8,y+10,8,8)
ctx.fillRect(x+24,y+10,8,8)

//角
ctx.fillStyle="black"
ctx.fillRect(x+5,y-10,5,10)
ctx.fillRect(x+30,y-10,5,10)

}

function draw(){

camX=player.x-200

ctx.clearRect(0,0,900,500)

//地面
ctx.fillStyle="#2c3e2f"
ctx.fillRect(0,400,2000,100)

//プレイヤー
drawPlayer(player.x-camX,player.y)

//敵
for(let e of enemies){

if(e.dead)continue

drawEnemy(e.x-camX,e.y)

}

//弾
ctx.fillStyle="orange"

for(let b of bullets){

ctx.fillRect(b.x-camX,b.y,10,5)

}

//障害物
ctx.fillStyle="gray"

for(let o of obstacles){

ctx.fillRect(o.x-camX,o.y,o.w,o.h)

}

}

function loop(){

update()
draw()
requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
