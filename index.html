<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>2D Demon Action</title>
<style>
body{
margin:0;
background:#111;
overflow:hidden;
}
canvas{
background:#1b2b1b;
display:block;
margin:auto;
}
</style>
</head>

<body>

<canvas id="game" width="900" height="500"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

let player={
x:100,
y:350,
vx:0,
vy:0,
w:30,
h:50,
onGround:false
}

let gravity=0.7

let enemies=[]
let bullets=[]
let obstacles=[]

function createWorld(){

for(let i=0;i<10;i++){

obstacles.push({
x:200+i*120,
y:400,
w:40,
h:40
})

}

for(let i=0;i<5;i++){

enemies.push({
x:500+i*250,
y:360,
cooldown:0
})

}

}

createWorld()

function shoot(enemy){

bullets.push({
x:enemy.x,
y:enemy.y+10,
vx:-4
})

}

function update(){

player.vx=0

if(keys["ArrowRight"]) player.vx=4
if(keys["ArrowLeft"]) player.vx=-4

if(keys["ArrowUp"] && player.onGround){

player.vy=-12
player.onGround=false

}

player.vy+=gravity

player.x+=player.vx
player.y+=player.vy

if(player.y>350){

player.y=350
player.vy=0
player.onGround=true

}

for(let o of obstacles){

if(
player.x<o.x+o.w &&
player.x+player.w>o.x &&
player.y+player.h>o.y &&
player.y+player.h<o.y+20
){

player.y=o.y-player.h
player.vy=0
player.onGround=true

}

}

for(let e of enemies){

if(e.x-camX<900 && e.x-camX>-50){

e.cooldown--

if(e.cooldown<=0){

shoot(e)
e.cooldown=120

}

}

}

for(let b of bullets){

b.x+=b.vx

if(
b.x>player.x &&
b.x<player.x+player.w &&
b.y>player.y &&
b.y<player.y+player.h
){

alert("GAME OVER")
location.reload()

}

}

}

let camX=0

function draw(){

camX=player.x-200

ctx.clearRect(0,0,900,500)

ctx.fillStyle="#333"

ctx.fillRect(0,400,2000,100)

ctx.fillStyle="cyan"
ctx.fillRect(player.x-camX,player.y,player.w,player.h)

ctx.fillStyle="red"

for(let e of enemies){

ctx.fillRect(e.x-camX,e.y,30,40)

}

ctx.fillStyle="orange"

for(let b of bullets){

ctx.fillRect(b.x-camX,b.y,10,5)

}

ctx.fillStyle="gray"

for(let o of obstacles){

ctx.fillRect(o.x-camX,o.y,o.w,o.h)

}

}

function loop(){

update()
draw()
requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
