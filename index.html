<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Keyboard 3D Demon Game</title>
<style>
body{margin:0;overflow:hidden;background:black;color:white;font-family:sans-serif}
#ui{position:absolute;top:10px;left:10px}
</style>
</head>

<body>

<div id="ui">
<h3>3D鬼討伐</h3>
WASD 移動<br>
← → 視点左右<br>
↑ ↓ 視点上下<br>
Space 攻撃<br>
Shift ダッシュ<br>
<p id="msg"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

let scene,camera,renderer
let demons=[]
let bullets=[]
let yaw=0
let pitch=0
let gameOver=false

init()
animate()

function init(){

scene=new THREE.Scene()
scene.background=new THREE.Color(0x0a0a1a)

camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000)
camera.position.y=1.7

renderer=new THREE.WebGLRenderer()
renderer.setSize(innerWidth,innerHeight)
document.body.appendChild(renderer.domElement)

let light=new THREE.DirectionalLight(0x88aaff,1)
light.position.set(20,50,10)
scene.add(light)

let ambient=new THREE.AmbientLight(0x404040)
scene.add(ambient)

createGround()
createForest()
createObstacles()
spawnDemons()

}

function createGround(){

let g=new THREE.PlaneGeometry(200,200)
let m=new THREE.MeshStandardMaterial({color:0x223322})
let floor=new THREE.Mesh(g,m)
floor.rotation.x=-Math.PI/2
scene.add(floor)

}

function createForest(){

for(let i=0;i<60;i++){

let tree=new THREE.Mesh(
new THREE.CylinderGeometry(0.3,0.5,6),
new THREE.MeshStandardMaterial({color:0x553322})
)

tree.position.set(Math.random()*180-90,3,Math.random()*180-90)

scene.add(tree)

}

}

function createObstacles(){

for(let i=0;i<25;i++){

let rock=new THREE.Mesh(
new THREE.BoxGeometry(2,2,2),
new THREE.MeshStandardMaterial({color:0x555555})
)

rock.position.set(Math.random()*100-50,1,Math.random()*100-50)

scene.add(rock)

}

}

function spawnDemons(){

for(let i=0;i<6;i++){

let body=new THREE.Mesh(
new THREE.CylinderGeometry(0.7,0.9,2.5),
new THREE.MeshStandardMaterial({color:0xaa0000})
)

body.position.set(Math.random()*60-30,1.2,Math.random()*60-30)

scene.add(body)

demons.push({
mesh:body,
cooldown:0
})

}

}

let keys={}

document.addEventListener("keydown",e=>{

keys[e.code]=true

if(e.code==="Space")attack()

})

document.addEventListener("keyup",e=>keys[e.code]=false)

function attack(){

let p=camera.position

for(let d of demons){

if(p.distanceTo(d.mesh.position)<3){

scene.remove(d.mesh)
demons=demons.filter(x=>x!==d)

}

}

}

function shoot(demon){

let g=new THREE.SphereGeometry(0.2)
let m=new THREE.MeshBasicMaterial({color:0xff0000})

let b=new THREE.Mesh(g,m)

b.position.copy(demon.mesh.position)

scene.add(b)

let dir=camera.position.clone().sub(b.position).normalize()

bullets.push({mesh:b,dir:dir})

}

function updateBullets(){

for(let b of bullets){

b.mesh.position.add(b.dir.clone().multiplyScalar(0.4))

if(camera.position.distanceTo(b.mesh.position)<1){

gameOver=true
document.getElementById("msg").innerText="GAME OVER"

}

}

}

function demonLogic(){

for(let d of demons){

let player=camera.position

let dir=player.clone().sub(d.mesh.position).normalize()

d.mesh.position.add(dir.multiplyScalar(0.01))

let vector=d.mesh.position.clone().project(camera)

let visible=
vector.x>-1&&vector.x<1&&
vector.y>-1&&vector.y<1&&
vector.z>0

if(visible){

d.cooldown--

if(d.cooldown<=0){

shoot(d)
d.cooldown=120

}

}

}

}

function movement(){

let speed=0.1

if(keys["ShiftLeft"])speed=0.2

let dir=new THREE.Vector3()

camera.getWorldDirection(dir)

let right=new THREE.Vector3().crossVectors(dir,new THREE.Vector3(0,1,0))

if(keys["KeyW"])camera.position.add(dir.clone().multiplyScalar(speed))
if(keys["KeyS"])camera.position.add(dir.clone().multiplyScalar(-speed))
if(keys["KeyA"])camera.position.add(right.clone().multiplyScalar(speed))
if(keys["KeyD"])camera.position.add(right.clone().multiplyScalar(-speed))

}

function viewControl(){

if(keys["ArrowLeft"])yaw+=0.03
if(keys["ArrowRight"])yaw-=0.03
if(keys["ArrowUp"])pitch+=0.02
if(keys["ArrowDown"])pitch-=0.02

pitch=Math.max(-1.3,Math.min(1.3,pitch))

camera.rotation.order="YXZ"
camera.rotation.y=yaw
camera.rotation.x=pitch

}

function animate(){

requestAnimationFrame(animate)

if(!gameOver){

movement()
viewControl()
demonLogic()
updateBullets()

}

renderer.render(scene,camera)

}

</script>

</body>
</html>
