<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Doll Demon Slayer Game</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
text-align:center;
}

canvas{
background:linear-gradient(#223,#445);
display:block;
margin:auto;
}

#ui{
padding:10px;
}

button{
padding:10px 20px;
font-size:18px;
}

</style>
</head>

<body>

<div id="ui">

<h2>人形 鬼討伐ゲーム</h2>

<p>
← → 移動　
<br>
↑ ジャンプ　
<br>
SPACE 攻撃　
<br>
SHIFT 防御
</p>

<p>
【ボスの倒し方】<br>
ボスの弾を防御して近づき攻撃！
</p>

<button onclick="restart()">やり直す</button>

<p id="stage">STAGE 1</p>

</div>

<canvas id="game" width="900" height="450"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let stage=1
let gameOver=false

let keys={}

document.addEventListener("keydown",e=>keys[e.code]=true)
document.addEventListener("keyup",e=>keys[e.code]=false)

function restart(){
stage=1
gameOver=false
initStage()
}

let player
let enemies=[]
let bullets=[]
let obstacles=[]

function initStage(){

player={
x:100,
y:300,
vx:0,
vy:0,
w:30,
h:60,
jump:false,
def:false
}

enemies=[]
bullets=[]
obstacles=[]

let enemyCount=stage+2

for(let i=0;i<enemyCount;i++){

enemies.push({
x:400+i*200,
y:300,
dir:1,
hp:2
})

}

if(stage%3==0){

enemies.push({
x:700,
y:280,
dir:1,
hp:10,
boss:true
})

}

for(let i=0;i<5;i++){

obstacles.push({
x:300+i*300,
y:330,
w:40,
h:40
})

}

document.getElementById("stage").innerText="STAGE "+stage

}

initStage()

function drawPlayer(){

ctx.fillStyle="white"

ctx.fillRect(player.x,player.y,player.w,player.h)

ctx.fillRect(player.x-10,player.y+10,10,10)
ctx.fillRect(player.x+30,player.y+10,10,10)

ctx.fillRect(player.x+10,player.y-10,10,10)

}

function drawEnemy(e){

ctx.fillStyle=e.boss?"purple":"red"

ctx.fillRect(e.x,e.y,30,60)

ctx.fillStyle="black"

ctx.fillRect(e.x+5,e.y+10,5,5)
ctx.fillRect(e.x+20,e.y+10,5,5)

}

function drawObstacle(o){

ctx.fillStyle="gray"

ctx.fillRect(o.x,o.y,o.w,o.h)

}

function update(){

if(gameOver)return

player.vx=0

if(keys["ArrowLeft"])player.vx=-5
if(keys["ArrowRight"])player.vx=5

if(keys["ArrowUp"]&&!player.jump){

player.vy=-12
player.jump=true

}

player.def=keys["ShiftLeft"]

player.x+=player.vx
player.y+=player.vy

player.vy+=0.6

if(player.y>300){
player.y=300
player.vy=0
player.jump=false
}

if(keys["Space"])attack()

for(let e of enemies){

e.x+=e.dir*2

if(Math.random()<0.01)e.dir*=-1

if(Math.random()<0.02){

bullets.push({
x:e.x,
y:e.y+20,
vx:-4
})

}

}

for(let b of bullets){

b.x+=b.vx

if(collide(player,b,10,10)){

if(!player.def){

gameOver=true

}

}

}

enemies=enemies.filter(e=>e.hp>0)

if(enemies.length==0){

stage++
initStage()

}

}

function attack(){

for(let e of enemies){

if(Math.abs(player.x-e.x)<60){

e.hp--

}

}

}

function collide(p,b,w,h){

return(
p.x<b.x+w &&
p.x+p.w>b.x &&
p.y<b.y+h &&
p.y+p.h>b.y
)

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let o of obstacles)drawObstacle(o)

for(let e of enemies)drawEnemy(e)

for(let b of bullets){

ctx.fillStyle="yellow"

ctx.fillRect(b.x,b.y,10,10)

}

drawPlayer()

if(gameOver){

ctx.fillStyle="white"
ctx.font="40px sans-serif"
ctx.fillText("GAME OVER",350,200)

}

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
