<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Doll Oni Battle</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
color:white;
}

canvas{
display:block;
margin:auto;
background:linear-gradient(#111,#330000);
}

#ui{
position:absolute;
top:10px;
left:10px;
}

#controls{
position:absolute;
bottom:10px;
left:10px;
font-size:14px;
}

#restart{
position:absolute;
top:220px;
left:50%;
transform:translateX(-50%);
padding:12px 25px;
font-size:18px;
display:none;
background:crimson;
border:none;
border-radius:10px;
color:white;
}
</style>
</head>

<body>

<div id="ui">
STAGE: <span id="stage">1</span>
</div>

<div id="controls">
操作<br>
← → 移動<br>
↑ ジャンプ<br>
Space 攻撃<br>
Shift 防御
</div>

<button id="restart" onclick="restartGame()">もう一度挑戦</button>

<canvas id="game" width="900" height="500"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let keys={}
document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

let player
let enemies=[]
let bullets=[]
let obstacles=[]
let boss=null

let worldX=0
let stage=1
let gameOver=false

function init(){

player={
x:200,
y:350,
vy:0,
jump:false,
attacking:false,
defending:false
}

worldX=0
enemies=[]
bullets=[]
obstacles=[]
boss=null
gameOver=false

spawnStage()

document.getElementById("restart").style.display="none"

}

function spawnStage(){

for(let i=0;i<4;i++){

enemies.push({
x:700+i*300,
y:350,
type:Math.floor(Math.random()*2),
hp:3,
shoot:120
})

}

for(let i=0;i<3;i++){

obstacles.push({
x:500+i*400,
y:380,
w:40,
h:40
})

}

boss={
x:2200,
y:330,
hp:15,
shoot:80,
dir:1
}

}

function update(){

if(gameOver)return

if(keys["ArrowRight"]) worldX+=4
if(keys["ArrowLeft"] && worldX>0) worldX-=4

if(keys["ArrowUp"] && !player.jump){

player.vy=-12
player.jump=true

}

player.vy+=0.6
player.y+=player.vy

if(player.y>=350){

player.y=350
player.vy=0
player.jump=false

}

if(keys[" "] && !player.attacking){

player.attacking=true
setTimeout(()=>player.attacking=false,200)

}

player.defending=keys["Shift"]

enemies.forEach(e=>{

let ex=e.x-worldX

if(e.type===0){

e.shoot--

if(e.shoot<0){

bullets.push({x:ex,y:e.y+20,speed:5})
e.shoot=120

}

}

if(e.type===1){

if(ex>player.x) e.x-=1.5
else e.x+=1.5

}

if(player.attacking && Math.abs(ex-player.x)<50){

e.hp--

}

if(Math.abs(ex-player.x)<30 && Math.abs(e.y-player.y)<50){

triggerGameOver()

}

})

enemies=enemies.filter(e=>e.hp>0)

bullets.forEach(b=>{

b.x-=b.speed

if(Math.abs(b.x-player.x)<20 && Math.abs(b.y-player.y)<40){

if(player.defending){

b.speed=-b.speed

}else{

triggerGameOver()

}

}

})

obstacles.forEach(o=>{

let ox=o.x-worldX

if(player.x+30>ox && player.x<ox+o.w && player.y+60>o.y){

triggerGameOver()

}

})

if(boss){

let bx=boss.x-worldX

boss.x+=boss.dir*2

if(boss.x>2400 || boss.x<2000) boss.dir*=-1

boss.shoot--

if(boss.shoot<0){

bullets.push({x:bx,y:boss.y+20,speed:6})
boss.shoot=80

}

if(player.attacking && Math.abs(bx-player.x)<60){

boss.hp--

}

if(Math.abs(bx-player.x)<40 && Math.abs(boss.y-player.y)<60){

triggerGameOver()

}

if(boss.hp<=0){

stage++
document.getElementById("stage").textContent=stage
init()

}

}

}

function drawDoll(x,y,color){

ctx.fillStyle=color

ctx.beginPath()
ctx.arc(x+15,y,10,0,Math.PI*2)
ctx.fill()

ctx.fillRect(x+12,y+10,6,25)

ctx.fillRect(x,y+15,12,4)
ctx.fillRect(x+18,y+15,12,4)

ctx.fillRect(x+5,y+35,5,20)
ctx.fillRect(x+20,y+35,5,20)

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawDoll(player.x,player.y,"white")

enemies.forEach(e=>{

let color=e.type===0?"red":"cyan"

drawDoll(e.x-worldX,e.y,color)

})

obstacles.forEach(o=>{

ctx.fillStyle="gray"
ctx.fillRect(o.x-worldX,o.y,o.w,o.h)

})

bullets.forEach(b=>{

ctx.fillStyle="orange"
ctx.beginPath()
ctx.arc(b.x,b.y,8,0,Math.PI*2)
ctx.fill()

})

if(boss){

drawDoll(boss.x-worldX,boss.y,"purple")

ctx.fillStyle="white"
ctx.fillText("BOSS",boss.x-worldX,boss.y-10)

}

if(player.attacking){

ctx.fillStyle="yellow"
ctx.fillRect(player.x+30,player.y+20,20,10)

}

if(player.defending){

ctx.strokeStyle="cyan"
ctx.beginPath()
ctx.arc(player.x+15,player.y+30,40,0,Math.PI*2)
ctx.stroke()

}

if(gameOver){

ctx.fillStyle="white"
ctx.font="50px sans-serif"
ctx.fillText("GAME OVER",300,250)

}

}

function triggerGameOver(){

gameOver=true
document.getElementById("restart").style.display="block"

}

function restartGame(){

stage=1
document.getElementById("stage").textContent=stage
init()

}

function loop(){

update()
draw()
requestAnimationFrame(loop)

}

init()
loop()

</script>
</body>
</html>
