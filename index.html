<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>人形剣士 vs 鬼</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:linear-gradient(#0a0a0a,#5a0000);
    font-family:sans-serif;
    color:white;
}
#ui{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
}
#gameCanvas{
    display:block;
    margin:0 auto;
    background:linear-gradient(#111,#330000);
}
</style>
</head>
<body>

<div id="ui">
    HP: <span id="hp">100</span>
    討伐数: <span id="score">0</span>
</div>

<canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let keys = {};
let player = {
    x:100,
    y:300,
    width:30,
    height:50,
    hp:100,
    attacking:false,
    dash:false,
    dashTimer:0
};

let enemy = spawnEnemy();
let score=0;

function spawnEnemy(){
    return {
        x:700,
        y:300,
        width:40,
        height:60,
        hp:40,
        speed:2+Math.random()*1.5
    };
}

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function update(){
    if(keys["ArrowRight"]) player.x+=4;
    if(keys["ArrowLeft"]) player.x-=4;

    if(keys[" "] && !player.attacking){
        player.attacking=true;
        setTimeout(()=>player.attacking=false,200);
    }

    if(keys["Shift"] && player.dashTimer<=0){
        player.dash=true;
        player.dashTimer=60;
    }

    if(player.dashTimer>0){
        player.dashTimer--;
        if(player.dashTimer<=0) player.dash=false;
    }

    // 敵追尾
    if(enemy.x > player.x) enemy.x -= enemy.speed;
    else enemy.x += enemy.speed;

    // 攻撃判定
    if(player.attacking &&
       Math.abs(player.x-enemy.x)<50){
        enemy.hp -=10;
    }

    // 被弾判定
    if(Math.abs(player.x-enemy.x)<30 && !player.dash){
        player.hp -=0.3;
    }

    if(enemy.hp<=0){
        score++;
        enemy = spawnEnemy();
    }

    if(player.hp<=0){
        alert("ゲームオーバー！討伐数: "+score);
        document.location.reload();
    }

    document.getElementById("hp").textContent=Math.floor(player.hp);
    document.getElementById("score").textContent=score;
}

function drawRect(obj,color){
    ctx.fillStyle=color;
    ctx.fillRect(obj.x,obj.y,obj.width,obj.height);
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // プレイヤー
    drawRect(player, player.dash?"cyan":"white");

    // 攻撃エフェクト
    if(player.attacking){
        ctx.fillStyle="yellow";
        ctx.fillRect(player.x+30,player.y+10,20,20);
    }

    // 敵（鬼風）
    drawRect(enemy,"red");
}

function gameLoop(){
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
